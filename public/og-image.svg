<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)"/>
  
  <!-- Grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>
  
  <!-- Main content -->
  <g>
    <!-- Icon -->
    <rect x="100" y="180" width="120" height="120" rx="20" fill="white" opacity="0.2"/>
    <path d="M 160 220 L 160 320 M 140 250 L 180 250 M 140 290 L 180 290" stroke="white" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Title -->
    <text x="250" y="260" font-family="Arial, sans-serif" font-size="72" font-weight="bold" fill="white">
      Toolbox
    </text>
    
    <!-- Subtitle -->
    <text x="250" y="320" font-family="Arial, sans-serif" font-size="36" fill="rgba(255,255,255,0.9)">
      30+ Free Developer Tools
    </text>
    
    <!-- Features -->
    <g transform="translate(100, 400)">
      <circle cx="10" cy="0" r="6" fill="white"/>
      <text x="30" y="8" font-family="Arial, sans-serif" font-size="24" fill="white">JSON Formatter</text>
      
      <circle cx="10" cy="40" r="6" fill="white"/>
      <text x="30" y="48" font-family="Arial, sans-serif" font-size="24" fill="white">Base64 Encoder</text>
      
      <circle cx="10" cy="80" r="6" fill="white"/>
      <text x="30" y="88" font-family="Arial, sans-serif" font-size="24" fill="white">Password Generator</text>
      
      <circle cx="400" cy="0" r="6" fill="white"/>
      <text x="420" y="8" font-family="Arial, sans-serif" font-size="24" fill="white">QR Code Generator</text>
      
      <circle cx="400" cy="40" r="6" fill="white"/>
      <text x="420" y="48" font-family="Arial, sans-serif" font-size="24" fill="white">Regex Tester</text>
      
      <circle cx="400" cy="80" r="6" fill="white"/>
      <text x="420" y="88" font-family="Arial, sans-serif" font-size="24" fill="white">And 24+ More...</text>
    </g>
  </g>
  
  <!-- Footer -->
  <text x="600" y="600" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.7)" text-anchor="middle">
    Free • No Sign-up • Privacy-First
  </text>
</svg>

